server:
  port: 8080

spring:
  application:
    name: spring-security-project
  datasource:
    url: ${AZURE_MYSQL_CONNECTIONSTRING}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect