services:

  securitydb:
    image: mysql
    container_name: securitydb
    ports:
      - 3306:3306
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 10s
      retries: 10
      interval: 10s
      start_period: 10s
    environment:
      MYSQL_DATABASE: securitydb
      MYSQL_ROOT_PASSWORD: root
    networks:
      - auroracode

  spring-security-project:
    image: "johndlr/spring-security-project:latest"
    container_name: spring-security-container
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: "spring-security-project"
      SPRING_DATASOURCE_URL: "jdbc:mysql://securitydb:3306/securitydb"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      securitydb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - auroracode

networks:
  auroracode:
    driver: "bridge"